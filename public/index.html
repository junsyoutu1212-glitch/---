<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>온책읽기 대시보드</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: sans-serif; margin:0; background:#f5f7fb; }
.container { max-width:1000px; margin:auto; padding:15px; }

.card {
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input,select,button {
  padding:8px;
  margin:5px 0;
  width:100%;
}

button {
  background:#4b6bfb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.row { display:flex; gap:10px; flex-wrap:wrap; }
.row > * { flex:1; }

@media(max-width:600px){
  .row { flex-direction:column; }
}
</style>
</head>

<body>
<div class="container">

<h2>📚 온책읽기 대시보드</h2>

<!-- 로그인 -->
<div class="card">
  <button onclick="login()">구글 로그인</button>
  <div id="user"></div>
</div>

<!-- 도서 -->
<div class="card">
  <h3>📖 도서 등록</h3>
  <input id="class" placeholder="반">
  <input id="title" placeholder="제목">
  <input id="author" placeholder="저자">
  <input id="pages" type="number" placeholder="쪽수">
  <button onclick="addBook()">추가</button>
</div>

<!-- 기록 -->
<div class="card">
  <h3>✏️ 기록</h3>
  <input id="name" placeholder="이름">
  <input id="class2" placeholder="반">
  <select id="book"></select>
  <input id="pagesToday" type="number" placeholder="오늘 읽은 쪽수">
  <button onclick="saveRecord()">저장</button>
</div>

<!-- 그래프 -->
<div class="card">
  <h3>📊 독서량 그래프</h3>
  <canvas id="chart"></canvas>
</div>

<!-- 기록 리스트 -->
<div class="card">
  <h3>📋 기록</h3>
  <div id="records"></div>
</div>

</div>

<script>
let profile = {};
let chart;

/* 🔐 로그인 */
function login(){
  google.accounts.id.initialize({
    client_id:"YOUR_CLIENT_ID",
    callback: async (res)=>{
      const r = await fetch("/auth/google",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({credential:res.credential})
      });
      const data = await r.json();
      profile = data.user;
      document.getElementById("user").innerText =
        profile.name + " (" + profile.role + ")";
    }
  });
  google.accounts.id.prompt();
}

/* 📚 도서 */
async function loadBooks(){
  const r = await fetch("/books");
  const data = await r.json();

  const sel = document.getElementById("book");
  sel.innerHTML="";

  data.books.forEach(b=>{
    const opt=document.createElement("option");
    opt.value=b.id;
    opt.textContent=b.title;
    sel.appendChild(opt);
  });
}

async function addBook(){
  await fetch("/books",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      className:class.value,
      title:title.value,
      author:author.value,
      pages:pages.value
    })
  });
  loadBooks();
}

/* 📊 기록 */
async function saveRecord(){
  await fetch("/records",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      studentName:name.value,
      className:class2.value,
      bookId:book.value,
      todayPages:Number(pagesToday.value),
      totalPages:Number(pagesToday.value),
      date:new Date().toISOString().slice(0,10)
    })
  });
  loadRecords();
}

/* 📋 기록 불러오기 */
async function loadRecords(){
  const r = await fetch("/records");
  const data = await r.json();

  const div=document.getElementById("records");
  div.innerHTML="";

  const dateMap={};

  data.records.forEach(rec=>{
    // 리스트
    const el=document.createElement("div");
    el.innerHTML = `
      ${rec.studentName} (${rec.totalPages}쪽)
      ${profile.role==="teacher"||profile.role==="admin"
        ? `<button onclick="deleteRecord(${rec.id})">삭제</button>`:""}
    `;
    div.appendChild(el);

    // 그래프용
    dateMap[rec.date]=(dateMap[rec.date]||0)+rec.todayPages;
  });

  renderChart(dateMap);
}

/* 🧑‍🏫 삭제 */
async function deleteRecord(id){
  await fetch("/records/"+id,{ method:"DELETE" });
  loadRecords();
}

/* 📊 그래프 */
function renderChart(data){
  const labels = Object.keys(data);
  const values = Object.values(data);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[{
        label:"읽은 쪽수",
        data:values
      }]
    }
  });
}

/* 🚀 시작 */
loadBooks();
loadRecords();
</script>
</body>
</html>
